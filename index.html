<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daniels-Nutrifit</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

    <!-- Header ist jetzt FEST im HTML -->
    <header class="bg-white p-4 shadow-md">
        <nav class="flex gap-4 justify-center">
            <button onclick="navigate('rezepte')" class="bg-blue-500 text-white px-4 py-2 rounded">Rezepte</button>
            <button onclick="navigate('ernaehrung')" class="bg-blue-500 text-white px-4 py-2 rounded">Ernährung</button>
            <button onclick="navigate('training')" class="bg-blue-500 text-white px-4 py-2 rounded">Training</button>
            <button onclick="navigate('creator')" class="bg-blue-500 text-white px-4 py-2 rounded">Creator</button>
        </nav>
    </header>

    <!-- Feedback Bereich -->
    <div id="status" class="text-center p-2 bg-green-200">Warte auf Verbindung...</div>

    <!-- Content Bereiche -->
    <div id="view-rezepte" class="p-6"><h1>Rezepte</h1></div>
    <div id="view-ernaehrung" class="p-6 hidden"><h1>Ernährung</h1></div>
    <div id="view-training" class="p-6 hidden"><h1>Training</h1></div>
    <div id="view-creator" class="p-6 hidden">
        <input type="password" id="pass" placeholder="Passwort">
        <button onclick="check()">Login</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDr4b7ZZcq76oIST9uvjVYLHwELja5V5bA",
            authDomain: "daniels-nutrifit.firebaseapp.com",
            projectId: "daniels-nutrifit",
            storageBucket: "daniels-nutrifit.firebasestorage.app",
            messagingSenderId: "497621585681",
            appId: "1:497621585681:web:5f3bc0d1c0e6fcc66346b0"
        };

        try {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            await signInAnonymously(auth);
            document.getElementById('status').textContent = "Erfolgreich verbunden!";
        } catch(e) {
            document.getElementById('status').textContent = "Fehler: " + e.message;
        }
    </script>

    <script>
        function navigate(id) {
            document.querySelectorAll('[id^="view-"]').forEach(el => el.classList.add('hidden'));
            document.getElementById('view-' + id).classList.remove('hidden');
        }
        function check() {
            if(document.getElementById('pass').value === "31124775") alert("Login ok!");
            else alert("Falsch");
        }
    </script>
</body>
</html>
